schema-version = "1.13.0"

[install]
rustc.pkg-path = "rustc"
rustc.version = "^1.95.0"
rustc.outputs = "all"
cargo.pkg-path = "cargo"
cargo.version = "^1.95.0"
rustfmt.pkg-path = "rustfmt"
rustfmt.version = "^1.95.0"
clippy.pkg-path = "clippy"
clippy.version = "^1.95.0"
pkg-config.pkg-path = "pkg-config"
pkg-config.version = "^0.29.2"
pkg-config.outputs = "all"
openssl.pkg-path = "openssl"
openssl.version = "^3.6.2"
openssl.outputs = "all"
markdownlint-cli.pkg-path = "markdownlint-cli"
markdownlint-cli.version = "0.48.0"
infer.flake = "github:inference-gateway/cli/v0.130.1"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.197"
claude-code.pkg-group = "claude-code"
codex.pkg-path = "codex"
codex.version = "^0.139.0"
codex.pkg-group = "codex"

[profile]
common = '''
  export PATH="$HOME/.local/bin:$PATH"
'''

