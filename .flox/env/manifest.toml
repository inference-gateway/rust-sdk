schema-version = "1.11.0"

[install]
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.141"
rustc.pkg-path = "rustc"
rustc.version = "^1.94.1"
rustc.outputs = "all"
cargo.pkg-path = "cargo"
cargo.version = "^1.94.1"
rustfmt.pkg-path = "rustfmt"
rustfmt.version = "^1.94.1"
clippy.pkg-path = "clippy"
clippy.version = "^1.94.1"
pkg-config.pkg-path = "pkg-config"
pkg-config.version = "^0.29.2"
pkg-config.outputs = "all"
openssl.pkg-path = "openssl"
openssl.version = "^3.6.1"
openssl.outputs = "all"
markdownlint-cli.pkg-path = "markdownlint-cli"
markdownlint-cli.version = "0.48.0"
infer.flake = "github:inference-gateway/cli/v0.109.11"

[profile]
common = '''
  export PATH="$HOME/.local/bin:$PATH"
'''

